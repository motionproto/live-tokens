name: Publish create-live-tokens to npm

on:
  push:
    tags:
      - 'create-v*'

# Allow manual re-runs from the Actions tab without re-tagging.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. create-v0.1.0)'
        required: true

# All run steps operate inside the initializer package, not the repo root.
defaults:
  run:
    working-directory: create-live-tokens

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing + provenance

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Tag is `create-v<version>` (prefixed so it never collides with the
      # main package's `v<version>` tags in the same repo).
      - name: Verify tag matches package.json version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          PKG_VERSION="create-v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Refuse to republish an existing version
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "$PKG_NAME@$PKG_VERSION is already on the registry — bump the version and re-tag." >&2
            exit 1
          fi

      - name: Dry-run packaging (catches missing files, bad bin, etc.)
        run: npm pack --dry-run

      - run: npm publish --provenance --access public
