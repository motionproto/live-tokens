name: Publish to npm

on:
  push:
    tags:
      - 'v*'

# Allow manual re-runs from the Actions tab without re-tagging.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.3.3)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing + provenance

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Refuse to republish an existing version
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "$PKG_NAME@$PKG_VERSION is already on the registry — bump the version and re-tag." >&2
            exit 1
          fi

      # `npm install` (not `npm ci`) because `package-lock.json` is
      # generated on macOS during local releases and cannot capture the
      # linux-only optional binaries that rolldown (bundled with vite 8+)
      # pulls in for the wasm32-wasi fallback path. `npm ci` would exit
      # EUSAGE on the missing @emnapi/* nodes. `npm install` resolves the
      # tree per-platform from package.json. We still gate the publish on
      # the `--frozen` semantics via `Verify tag matches package.json`
      # earlier in the workflow.
      - run: npm install --include=optional --no-audit --no-fund

      - run: npm test --if-present

      - name: Dry-run packaging (catches missing files, bad exports, etc.)
        run: npm pack --dry-run

      - run: npm publish --provenance --access public
