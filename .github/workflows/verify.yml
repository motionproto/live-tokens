name: Verify

# Catches the failure modes that have bitten us right before a publish:
# type errors, broken plugin build, and packaging regressions. If this is
# green on main, `publish.yml` will be too.
#
# Install mirrors publish.yml: `npm install --include=optional` (NOT `npm ci`).
# The package-lock.json is generated on macOS and cannot capture rolldown's
# linux-only `@emnapi/*` optional binaries (the wasm32-wasi fallback bundled
# with vite 8+), so `npm ci` false-fails on linux with EUSAGE. `npm install`
# resolves the tree per-platform from package.json.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install (mirrors publish.yml)
        run: npm install --include=optional --no-audit --no-fund

      - name: Type-check
        run: npm run check

      - name: Test
        run: npm test --if-present

      - name: Build library
        run: npm run build:lib

      - name: Verify package contents
        run: npm pack --dry-run
