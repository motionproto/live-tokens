name: Publish to npm

on:
  push:
    tags:
      - 'v*'

# Allow manual re-runs from the Actions tab without re-tagging.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.3.3)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing + provenance

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - run: npm ci

      - run: npm test --if-present

      - run: npm publish --provenance --access public
